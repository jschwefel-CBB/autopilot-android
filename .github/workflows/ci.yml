name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build androidTest APK
        run: ./gradlew assembleDebugAndroidTest

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload androidTest APK
        uses: actions/upload-artifact@v4
        with:
          name: androidtest-apk
          path: app/build/outputs/apk/androidTest/debug/*.apk

  # Run the full unified 78-step plan on an emulator — the Android analogue of
  # the iOS XCUITest / macOS CLI run. Hard gate: the instrumented test fails the
  # job if any plan step fails. Emulators run KVM-accelerated on Linux runners.
  #
  # RELIABILITY GATE: the plan is run REPEATEDLY (not once). A single run hides
  # intermittent/timing flakes — a step that fails ~half the time still passes a
  # one-shot run often enough to go green. Running it N consecutive times and
  # failing if ANY iteration fails turns "passed once" into "passed N in a row",
  # which is the signal external consumers (e.g. driving a real Compose app) need.
  instrumented-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unified plan on emulator (5x reliability gate)
        # Pinned to a full commit SHA (v2.34.0) per supply-chain hardening —
        # a tag is mutable; a SHA is immutable.
        uses: reactivecircus/android-emulator-runner@62dbb605bba737720e10b196cb4220d374026a6d
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Build+install the app and androidTest APKs once, then run the
          # instrumentation 5 times in a row. Fail the job if ANY run fails — this
          # is the reliability gate that catches intermittent/timing flakes a
          # single run would let through.
          script: |
            set -e
            ./gradlew :app:installDebug :app:installDebugAndroidTest
            RUNNER="com.autopilot.testhostapp.test/androidx.test.runner.AndroidJUnitRunner"
            for i in 1 2 3 4 5; do
              echo "::group::Unified plan run $i/5"
              OUT=$(adb shell am instrument -w \
                -e class com.autopilot.testhostapp.AutoPilotRunnerTest "$RUNNER" 2>&1)
              echo "$OUT"
              echo "::endgroup::"
              if ! echo "$OUT" | grep -q 'OK ('; then
                echo "::error::Unified plan FAILED on run $i/5 (intermittent flake or regression)"
                exit 1
              fi
            done
            echo "Unified plan passed 5/5 consecutive runs."

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: app/build/reports/androidTests/
