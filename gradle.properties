# Project-wide Gradle settings. These are required for the build and MUST be
# committed (CI has no other source for them). Machine-specific overrides
# (e.g. org.gradle.java.home, sdk.dir) belong in the gitignored local.properties,
# or pass them per-invocation (e.g. JAVA_HOME) — do NOT commit machine paths here.

# AndroidX is required: every dependency (appcompat, material, recyclerview) is
# AndroidX. Without this, the :app:checkDebugAarMetadata task fails the build.
android.useAndroidX=true

# The project compiles against a newer compileSdk than the pinned Android Gradle
# Plugin was tested with; suppress the (non-fatal) warning so CI logs stay clean.
android.suppressUnsupportedCompileSdk=36

# Standard performance + style defaults.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
kotlin.code.style=official
